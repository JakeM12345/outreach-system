name: Daily Outreach Emails

on:
  schedule:
    # 9am AEST (Sydney) Mon–Thu = 11pm UTC Sun–Wed
    - cron: "0 23 * * 0,1,2,3"
  workflow_dispatch:   # allows you to run it manually from GitHub too

jobs:
  send-outreach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Enrich leads with Hunter.io emails
        env:
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
        run: python enrich.py

      - name: Send outreach emails
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GMAIL_ADDRESS:         ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_NAME:           ${{ secrets.SENDER_NAME }}
          DAILY_EMAIL_LIMIT:     ${{ secrets.DAILY_EMAIL_LIMIT }}
          DELAY_BETWEEN_EMAILS:  ${{ secrets.DELAY_BETWEEN_EMAILS }}
        run: python emailer.py

      - name: Commit updated sent_log.csv and leads.csv back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leads.csv sent_log.csv || true
          git diff --staged --quiet || git commit -m "Update sent log and leads [skip ci]"
          git push
