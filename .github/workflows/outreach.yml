name: Daily Outreach Emails

on:
  schedule:
    - cron: "0 23 * * 0,1,2,3"
  workflow_dispatch:

jobs:
  send-outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Scrape fresh leads
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python emailer.py
        env:
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
        run: python enrich.py
      - name: Send emails
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          DAILY_EMAIL_LIMIT: ${{ secrets.DAILY_EMAIL_LIMIT }}
          DELAY_BETWEEN_EMAILS: ${{ secrets.DELAY_BETWEEN_EMAILS }}
        run: python emailer.py --leads-file all_leads_northern_beaches.csv
      - name: Save logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add all_leads_northern_beaches.csv sent_log.csv || true
          git diff --staged --quiet || git commit -m "Update sent log [skip ci]"
          git push
